# Demand Forecasting Platform — full local stack
#
#   docker compose up --build
#
# Services:
#   api        FastAPI forecast service           -> http://localhost:8000  (docs at /docs)
#   dashboard  Streamlit interactive dashboard     -> http://localhost:8501
#   mlflow     MLflow tracking server UI           -> http://localhost:5000
#   nginx      Reverse proxy / single entrypoint   -> http://localhost:80

services:
  api:
    build:
      context: .
      dockerfile: deployment/Dockerfile.api
    container_name: forecast-api
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
      - ./models:/app/models
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  dashboard:
    build:
      context: .
      dockerfile: deployment/Dockerfile.dashboard
    container_name: forecast-dashboard
    restart: unless-stopped
    env_file: .env
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
      - ./monitoring:/app/monitoring
    depends_on:
      - api

  mlflow:
    image: python:3.12-slim
    container_name: forecast-mlflow
    restart: unless-stopped
    working_dir: /mlflow
    volumes:
      - ./mlflow:/mlflow
    ports:
      - "5000:5000"
    command: >
      bash -c "pip install --no-cache-dir mlflow==3.14.0 &&
               mlflow server --backend-store-uri sqlite:////mlflow/mlflow.db
               --default-artifact-root /mlflow/artifacts
               --host 0.0.0.0 --port 5000"

  nginx:
    image: nginx:1.27-alpine
    container_name: forecast-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./deployment/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - dashboard

networks:
  default:
    name: forecast-network
